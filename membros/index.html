<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangue Carmesim • Somador Membros</title>
    <link rel="stylesheet" href="../ADM/style.css">
</head>

<body>
    <div class="container">

        <header>
            <h1>🌹 Sangue Carmesim</h1>
            <p>Sistema de Cálculo • Membros</p>
        </header>

        <main>

            <section class="input-area">
                <label for="relatorio">📄 Cole o relatório:</label>
                <textarea id="relatorio" placeholder="Cole aqui o relatório completo..."></textarea>
            </section>

            <section class="actions">
                <button id="calcular">Calcular Pontuação</button>
                <button id="limpar" class="secondary">Limpar</button>
            </section>

            <section class="resultado">
                <h2>Resultado</h2>
                <div id="pontuacao">0</div>
                <p id="mensagem">Aguardando cálculo...</p>
            </section>

        </main>

        <footer>
            <p>Dark Roses renasceu como Sangue Carmesim 🌫️🌹</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
